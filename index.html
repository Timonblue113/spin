<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Lucky Wheel PRO MAX</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #222 url("1.jpg") no-repeat center center;
    background-size: cover;
    height: 100vh;
    overflow: hidden;
}

#wheelContainer {
    position: absolute;
    right: 200px;
    top: 50%;
    transform: translateY(-50%);
    width: 700px;
    height: 700px;
}

canvas { width: 700px; height: 700px; }

#spinBtn {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 140px; height: 140px;
    border-radius: 50%;
    font-size: 24px;
    background: radial-gradient(circle, #ffcc70, #ff3c00);
    color: #fff;
    border: 5px solid #fff;
    cursor: pointer;
}

#arrow {
    position: absolute;
    right: -20px;
    top: 50%;
    transform: translateY(-50%);
    border-top: 25px solid transparent;
    border-bottom: 25px solid transparent;
    border-right: 40px solid gold;
}

.popup {
    position: fixed;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.7);
    display: none;
    justify-content: center;
    align-items: center;
}

.box {
    background:#fff;
    padding:30px;
    border-radius:15px;
    text-align:center;
}

input {
    width:90%;
    padding:10px;
    margin:10px 0;
}

.btn {
    padding:10px 20px;
    color:#fff;
    border:none;
    cursor:pointer;
}

.green{background:#28a745;}
.red{background:#dc3545;}

#resultBox{
    background:#b30000;
    padding:40px;
    color:#fff;
    border-radius:20px;
}
</style>
</head>

<body>

<div id="wheelContainer">
    <div id="arrow"></div>
    <canvas id="wheel"></canvas>
    <button id="spinBtn">QUAY</button>
</div>

<div id="formPopup" class="popup">
    <div class="box">
        <h3>Nhập thông tin</h3>
        <input id="name" placeholder="Tên">
        <input id="phone" placeholder="SĐT">
        <br>
        <button class="btn green" onclick="confirmForm()">OK</button>
        <button class="btn red" onclick="closeForm()">Hủy</button>
    </div>
</div>

<div id="resultPopup" class="popup">
    <div id="resultBox">
        <h2>🎁 TRÚNG THƯỞNG</h2>
        <div id="resultText" style="font-size:40px;color:yellow"></div>
    </div>
</div>

<script>
let prizes = [
    { label:"Gối", qty:10, weight:5 },
    { label:"Rửa xe", qty:20, weight:10 },
    { label:"Khăn", qty:50, weight:30 },
    { label:"Dù", qty:10, weight:5 }
];

let history = [];
let currentUser = {};
let spinning=false, ready=false;

const canvas=document.getElementById("wheel");
const ctx=canvas.getContext("2d");

function draw(){
    canvas.width=700;
    canvas.height=700;
    let arc=Math.PI*2/prizes.length;

    for(let i=0;i<prizes.length;i++){
        ctx.beginPath();
        ctx.fillStyle=i%2?"#fff":"#c1121f";
        ctx.moveTo(350,350);
        ctx.arc(350,350,300,i*arc,(i+1)*arc);
        ctx.fill();

        ctx.save();
        ctx.translate(350,350);
        ctx.rotate(i*arc+arc/2);
        ctx.fillStyle=i%2?"#c1121f":"#fff";
        ctx.fillText(prizes[i].label,250,10);
        ctx.restore();
    }
}
draw();

spinBtn.onclick=()=>{
    if(spinning) return;
    if(!ready) formPopup.style.display="flex";
    else spin();
};

function confirmForm(){
    currentUser={
        name:name.value,
        phone:phone.value
    };
    ready=true;
    formPopup.style.display="none";
}

function spin(){
    spinning=true;

    let totalWeight=prizes.reduce((s,p)=>s+(p.qty>0?p.weight:0),0);
    let r=Math.random()*totalWeight;
    let sum=0, winIndex=0;

    for(let i=0;i<prizes.length;i++){
        if(prizes[i].qty>0){
            sum+=prizes[i].weight;
            if(r<=sum){ winIndex=i; break;}
        }
    }

    let winItem=prizes[winIndex];
    let angle=360*8 + (360-(winIndex*360/prizes.length));

    canvas.style.transition="5s";
    canvas.style.transform=`rotate(${angle}deg)`;

    setTimeout(()=>{

        winItem.qty--;

        let newData={
            time:new Date().toLocaleString(),
            name:currentUser.name,
            phone:currentUser.phone,
            prize:winItem.label
        };

        history.push(newData);

        // 🔥 realtime
        saveFirebase(newData);

        resultText.innerText=winItem.label;
        resultPopup.style.display="flex";

        spinning=false;
        ready=false;

    },5000);
}

function closeForm(){formPopup.style.display="none";}
resultPopup.onclick=()=>resultPopup.style.display="none";
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app=initializeApp({
 apiKey:"AIzaSyCm8ejT3uH_SWx7HqRke7ICxSCLpHvWNlg",
 databaseURL:"https://bluespin-34b50-default-rtdb.firebaseio.com"
});

const db=getDatabase(app);

// realtime
onValue(ref(db,"prizes"),s=>{
    if(s.exists()){prizes=s.val(); draw();}
});

onValue(ref(db,"history"),s=>{
    if(s.exists()){history=Object.values(s.val());}
});

// save
window.saveFirebase=(item)=>{
    set(ref(db,"prizes"),prizes);
    push(ref(db,"history"),item);
};
</script>

</body>
</html>
