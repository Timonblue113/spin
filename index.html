<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Lucky Wheel PRO MAX</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #222 url("1.jpg") no-repeat center center;
    background-size: cover;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
}

#wheelContainer {
    position: absolute;
    right: 200px;
    top: 50%;
    transform: translateY(-50%);
    width: 700px;
    height: 700px;
}

canvas {
    width: 700px;
    height: 700px;
}

#spinBtn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 140px;
    height: 140px;
    border-radius: 50%;
    font-size: 24px;
    font-weight: bold;
    background: radial-gradient(circle, #ffcc70, #ff3c00);
    color: #fff;
    border: 5px solid #fff;
    cursor: pointer;
}

#arrow {
    position: absolute;
    right: -20px;
    top: 50%;
    transform: translateY(-50%);
    border-top: 25px solid transparent;
    border-bottom: 25px solid transparent;
    border-right: 40px solid gold;
}

.popup {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    display: none;
    justify-content: center;
    align-items: center;
}

.box {
    background: #fff;
    padding: 30px;
    width: 400px;
    border-radius: 15px;
    text-align: center;
}

input {
    width: 90%;
    padding: 12px;
    margin: 10px 0;
}

.btn {
    padding: 12px 25px;
    border: none;
    color: #fff;
    cursor: pointer;
}
.green { background: green; }
.red { background: red; }

#resultBox {
    background: #b30000;
    padding: 40px;
    border-radius: 20px;
    color: #fff;
    border: 5px solid gold;
}
</style>
</head>

<body>

<div id="wheelContainer">
    <div id="arrow"></div>
    <canvas id="wheel"></canvas>
    <button id="spinBtn">QUAY</button>
</div>

<div id="formPopup" class="popup">
    <div class="box">
        <h3>Nhập thông tin</h3>
        <input id="name" placeholder="Tên">
        <input id="phone" placeholder="SĐT">
        <br>
        <button class="btn green" onclick="confirmForm()">OK</button>
        <button class="btn red" onclick="closeForm()">Hủy</button>
    </div>
</div>

<div id="resultPopup" class="popup">
    <div id="resultBox">
        <h1>🎁 TRÚNG THƯỞNG</h1>
        <div id="resultText" style="font-size:40px;color:yellow"></div>
    </div>
</div>

<script>
// ===== CODE GỐC (GIỮ NGUYÊN) =====
const DEFAULT_PRIZES = [
    { label: "Gối Tựa Đầu", qty: 10, weight: 7 },
    { label: "Phiếu Rửa Xe", qty: 20, weight: 14 },
    { label: "Khăn Lau Xe", qty: 57, weight: 34 },
    { label: "DÙ HONDA", qty: 10, weight: 7 },
    { label: "Nước Hoa", qty: 3, weight: 2 },
    { label: "Voucher Phụ Kiện", qty: 1, weight: 1 },
    { label: "Voucher Làm Đẹp Xe", qty: 2, weight: 1 },
    { label: "Khăn Lau Xe", qty: 57, weight: 34 }
];

let prizes = JSON.parse(localStorage.getItem('wheel_prizes')) || DEFAULT_PRIZES;
let history = JSON.parse(localStorage.getItem('wheel_history')) || [];

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
let spinning = false;
let ready = false;
let currentUser = { name: "", phone: "" };

function draw(){
    canvas.width = 700;
    canvas.height = 700;
    let arc = Math.PI*2/prizes.length;

    for(let i=0; i<prizes.length; i++){
        ctx.beginPath();
        ctx.fillStyle = i%2==0 ? "#c1121f" : "#ffffff";
        ctx.moveTo(350,350);
        ctx.arc(350,350,300,i*arc,(i+1)*arc);
        ctx.fill();

        ctx.save();
        ctx.translate(350,350);
        ctx.rotate(i*arc + arc/2);
        ctx.fillStyle = i%2==0 ? "#fff" : "#c1121f";
        ctx.fillText(prizes[i].label,250,10);
        ctx.restore();
    }
}
draw();

document.getElementById("spinBtn").onclick = ()=>{
    if(spinning) return;
    if(!ready) document.getElementById("formPopup").style.display="flex";
    else spin();
};

function confirmForm(){
    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    if(!name || !phone) return alert("Nhập đủ!");
    currentUser = { name, phone };
    document.getElementById("formPopup").style.display="none";
    ready = true;
}

function spin(){
    if (spinning) return;

    let totalWeight = prizes.reduce((sum,p)=> sum+(p.qty>0?p.weight:0),0);
    let r=Math.random()*totalWeight, sum=0, index=0;

    for(let i=0;i<prizes.length;i++){
        if(prizes[i].qty>0){
            sum+=prizes[i].weight;
            if(r<=sum){ index=i; break; }
        }
    }

    canvas.style.transition="5s";
    canvas.style.transform=`rotate(${360*10 + (360-(index*(360/prizes.length)))}deg)`;

    setTimeout(()=>{
        prizes[index].qty--;

        history.push({
            time:new Date().toLocaleString(),
            name:currentUser.name,
            phone:currentUser.phone,
            prize:prizes[index].label
        });

        localStorage.setItem('wheel_prizes', JSON.stringify(prizes));
        localStorage.setItem('wheel_history', JSON.stringify(history));

        // 🔥 FIREBASE SAVE
        if(window.saveFirebase) window.saveFirebase();

        document.getElementById("resultText").innerText=prizes[index].label;
        document.getElementById("resultPopup").style.display="flex";

        spinning=false;
        ready=false;
    },5000);
}

function closeForm(){
    document.getElementById("formPopup").style.display="none";
}

// ===== FIREBASE (THÊM) =====
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCm8ejT3uH_SWx7HqRke7ICxSCLpHvWNlg",
  authDomain: "bluespin-34b50.firebaseapp.com",
  databaseURL: "https://bluespin-34b50-default-rtdb.firebaseio.com",
  projectId: "bluespin-34b50"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// realtime sync
onValue(ref(db,'prizes'), s=>{
    if(s.exists()){
        prizes = s.val();
        draw();
    }
});

onValue(ref(db,'history'), s=>{
    if(s.exists()) history = s.val();
});

// save
window.saveFirebase = ()=>{
    set(ref(db,'prizes'), prizes);
    set(ref(db,'history'), history);
};
</script>

</body>
</html>
