<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Lucky Wheel PRO MAX</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #222 url("1.jpg") no-repeat center center;
    background-size: cover;
    height: 100vh;
    overflow: hidden;
}

#wheelContainer {
    position: absolute;
    right: 200px;
    top: 50%;
    transform: translateY(-50%);
    width: 700px;
    height: 700px;
}

canvas { width: 700px; height: 700px; }

#spinBtn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 140px;
    height: 140px;
    border-radius: 50%;
    font-size: 24px;
    font-weight: bold;
    background: radial-gradient(circle, #ffcc70, #ff3c00);
    color: #fff;
    border: 5px solid #fff;
    cursor: pointer;
}

#arrow {
    position: absolute;
    right: -20px;
    top: 50%;
    transform: translateY(-50%);
    border-top: 25px solid transparent;
    border-bottom: 25px solid transparent;
    border-right: 40px solid gold;
}

.popup {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    display: none;
    justify-content: center;
    align-items: center;
}

.box {
    background: #fff;
    padding: 30px;
    width: 400px;
    border-radius: 15px;
    text-align: center;
}

input {
    width: 90%;
    padding: 12px;
    margin: 10px 0;
}

.btn {
    padding: 10px 20px;
    border: none;
    color: #fff;
    cursor: pointer;
}
.green { background: green; }
.red { background: red; }

#resultBox {
    background: #b30000;
    padding: 40px;
    border-radius: 20px;
    color: #fff;
    border: 5px solid gold;
}
</style>
</head>

<body>

<div id="wheelContainer">
    <div id="arrow"></div>
    <canvas id="wheel"></canvas>
    <button id="spinBtn">QUAY</button>
</div>

<div id="formPopup" class="popup">
    <div class="box">
        <h3>Nhập thông tin</h3>
        <input id="name" placeholder="Tên">
        <input id="phone" placeholder="SĐT">
        <br>
        <button class="btn green" onclick="confirmForm()">OK</button>
        <button class="btn red" onclick="closeForm()">Hủy</button>
    </div>
</div>

<div id="resultPopup" class="popup">
    <div id="resultBox">
        <h1>🎁 TRÚNG THƯỞNG</h1>
        <div id="resultText" style="font-size:40px;color:yellow"></div>
    </div>
</div>

<script type="module">
// ===== 1. KHAI BÁO DATA TRƯỚC =====
const DEFAULT_PRIZES = [
    { label: "Gối", qty: 10, weight: 7 },
    { label: "Rửa xe", qty: 20, weight: 14 },
    { label: "Khăn", qty: 50, weight: 30 },
    { label: "Dù", qty: 10, weight: 7 },
    { label: "Nước hoa", qty: 3, weight: 2 },
    { label: "Voucher", qty: 2, weight: 1 }
];

let prizes = DEFAULT_PRIZES;
let history = [];

// ===== 2. FIREBASE =====
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCm8ejT3uH_SWx7HqRke7ICxSCLpHvWNlg",
  authDomain: "bluespin-34b50.firebaseapp.com",
  databaseURL: "https://bluespin-34b50-default-rtdb.firebaseio.com",
  projectId: "bluespin-34b50"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// LOAD REALTIME
onValue(ref(db, 'prizes'), (s)=>{
    if(s.exists()){
        prizes = s.val();
        draw();
    }
});
onValue(ref(db, 'history'), (s)=>{
    if(s.exists()) history = s.val();
});

// INIT DATA
get(ref(db,'prizes')).then(s=>{
    if(!s.exists()) set(ref(db,'prizes'), prizes);
});

// SAVE
function saveData(){
    set(ref(db,'prizes'), prizes);
    set(ref(db,'history'), history);
}

// ===== 3. VẼ =====
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

function draw(){
    canvas.width=700; canvas.height=700;
    let arc=2*Math.PI/prizes.length;
    for(let i=0;i<prizes.length;i++){
        ctx.beginPath();
        ctx.fillStyle=i%2?"#fff":"#c1121f";
        ctx.moveTo(350,350);
        ctx.arc(350,350,300,i*arc,(i+1)*arc);
        ctx.fill();

        ctx.save();
        ctx.translate(350,350);
        ctx.rotate(i*arc+arc/2);
        ctx.fillStyle=i%2?"#c1121f":"#fff";
        ctx.fillText(prizes[i].label,250,10);
        ctx.restore();
    }
}
draw();

// ===== 4. LOGIC =====
let spinning=false, ready=false, currentUser={};

document.getElementById("spinBtn").onclick=()=>{
    if(spinning) return;
    if(!ready) document.getElementById("formPopup").style.display="flex";
    else spin();
};

window.confirmForm=()=>{
    let nameInput = document.getElementById("name");
    let phoneInput = document.getElementById("phone");

    if(!nameInput.value || !phoneInput.value){
        alert("Nhập đủ!");
        return;
    }

    currentUser.name = nameInput.value;
    currentUser.phone = phoneInput.value;

    ready=true;
    document.getElementById("formPopup").style.display="none";
};

window.closeForm=()=>{
    document.getElementById("formPopup").style.display="none";
};

function spin(){
    spinning=true;

    let total=prizes.reduce((s,p)=>s+(p.qty>0?p.weight:0),0);
    let r=Math.random()*total, sum=0, index=0;

    for(let i=0;i<prizes.length;i++){
        if(prizes[i].qty>0){
            sum+=prizes[i].weight;
            if(r<=sum){ index=i; break; }
        }
    }

    let arc=360/prizes.length;
    let deg=360*10 + (360-(index*arc+arc/2));
    canvas.style.transition="5s";
    canvas.style.transform=`rotate(${deg}deg)`;

    setTimeout(()=>{
        prizes[index].qty--;

        history.push({
            time:new Date().toLocaleString(),
            name:currentUser.name,
            phone:currentUser.phone,
            prize:prizes[index].label
        });

        saveData();

        document.getElementById("resultText").innerText=prizes[index].label;
        document.getElementById("resultPopup").style.display="flex";

        spinning=false;
        ready=false;
    },5000);
}

// EXPORT
window.addEventListener('keydown', e=>{
    if(e.key==="F9"){
        let wb=XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(history),"History");
        XLSX.writeFile(wb,"report.xlsx");
    }
});
</script>

</body>
</html>
