<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Lucky Wheel PRO MAX</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #222 url("1.jpg") no-repeat center center;
    background-size: cover;
    height: 100vh;
    overflow: hidden;
}

#wheelContainer {
    position: absolute;
    right: 200px;
    top: 50%;
    transform: translateY(-50%);
    width: 700px;
    height: 700px;
}

canvas {
    width: 700px;
    height: 700px;
}

#spinBtn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 140px;
    height: 140px;
    border-radius: 50%;
    font-size: 24px;
    font-weight: bold;
    background: radial-gradient(circle, #ffcc70, #ff3c00);
    color: #fff;
    border: 5px solid #fff;
    cursor: pointer;
}

#arrow {
    position: absolute;
    right: -20px;
    top: 50%;
    transform: translateY(-50%);
    border-top: 25px solid transparent;
    border-bottom: 25px solid transparent;
    border-right: 40px solid gold;
}

.popup {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    display: none;
    justify-content: center;
    align-items: center;
}

.box {
    background: #fff;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px;
}

.btn { padding: 10px 20px; color: #fff; border: none; }
.green { background: green; }
.red { background: red; }

#resultBox {
    background: #b30000;
    padding: 40px;
    color: #fff;
    border-radius: 20px;
}
</style>
</head>

<body>

<div id="wheelContainer">
    <div id="arrow"></div>
    <canvas id="wheel"></canvas>
    <button id="spinBtn">QUAY</button>
</div>

<div id="formPopup" class="popup">
<div class="box">
<input id="name" placeholder="Tên">
<input id="phone" placeholder="SĐT">
<button class="btn green" onclick="confirmForm()">OK</button>
</div>
</div>

<div id="resultPopup" class="popup">
<div id="resultBox">
<h2 id="resultText"></h2>
</div>
</div>

<script>
const DEFAULT_PRIZES = [
{ label:"Gối", qty:10, weight:7 },
{ label:"Rửa xe", qty:20, weight:14 },
{ label:"Khăn", qty:50, weight:30 },
{ label:"Ô", qty:10, weight:7 }
];

window.isSpinningLock = false;

let prizes = JSON.parse(localStorage.getItem('wheel_prizes')) || DEFAULT_PRIZES;
let history = JSON.parse(localStorage.getItem('wheel_history')) || [];

let spinning=false, ready=false;
let currentUser={};

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

function draw(){
let arc = 2*Math.PI/prizes.length;
canvas.width=700;
canvas.height=700;

for(let i=0;i<prizes.length;i++){
ctx.beginPath();
ctx.fillStyle=i%2?"#fff":"#c1121f";
ctx.moveTo(350,350);
ctx.arc(350,350,350,i*arc,(i+1)*arc);
ctx.fill();

ctx.save();
ctx.translate(350,350);
ctx.rotate(i*arc+arc/2);
ctx.fillStyle=i%2?"#c1121f":"#fff";
ctx.fillText(prizes[i].label,300,0);
ctx.restore();
}
}
draw();

spinBtn.onclick=()=>{
if(!ready) formPopup.style.display="flex";
else spin();
}

function confirmForm(){
currentUser={
name:name.value,
phone:phone.value
};
formPopup.style.display="none";
ready=true;
}

function spin(){
if(spinning) return;

spinning=true;
window.isSpinningLock=true;

let total=prizes.reduce((s,p)=>s+(p.qty>0?p.weight:0),0);
let r=Math.random()*total;

let sum=0, index=0;

for(let i=0;i<prizes.length;i++){
if(prizes[i].qty>0){
sum+=prizes[i].weight;
if(r<=sum){ index=i; break; }
}
}

let arc=360/prizes.length;
let deg=360*10+(360-index*arc-arc/2);

canvas.style.transition="5s";
canvas.style.transform=`rotate(${deg}deg)`;

setTimeout(()=>{

prizes[index].qty--;

history.push({
name:currentUser.name,
phone:currentUser.phone,
gift:prizes[index].label
});

localStorage.setItem("wheel_prizes",JSON.stringify(prizes));
localStorage.setItem("wheel_history",JSON.stringify(history));

if(window.saveFirebase) saveFirebase();

resultText.innerText=prizes[index].label;
resultPopup.style.display="flex";

spinning=false;
ready=false;
window.isSpinningLock=false;

},5000);
}

// F9 export
window.addEventListener("keydown",e=>{
if(e.key==="F9"){
let wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(history),"KH");
XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(prizes),"Kho");
XLSX.writeFile(wb,"baocao.xlsx");
}
});
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, update, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app = initializeApp({
apiKey:"AIzaSy...",
databaseURL:"https://bluespin-34b50-default-rtdb.firebaseio.com"
});

const db = getDatabase(app);

onValue(ref(db,"prizes"),s=>{
if(s.exists() && !window.isSpinningLock){
prizes=s.val();
draw();
}
});

onValue(ref(db,"history"),s=>{
if(s.exists()) history=s.val();
});

window.saveFirebase=()=>{
update(ref(db),{prizes,history});
};
</script>

</body>
</html>
